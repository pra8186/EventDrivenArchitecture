server.port=8082
spring.application.name=event-service

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres?currentSchema=eventdriven_1
spring.datasource.username=psharma51
spring.datasource.password=password

# Flyway
spring.flyway.enabled=true
spring.flyway.schemas=eventdriven_1
spring.flyway.locations=classpath:db/migration

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=eventdriven

# Kafka
app.kafka.topic=tax-events
