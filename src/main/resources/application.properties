# PostgreSQL datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres?currentSchema=eventdriven
spring.datasource.username=psharma51
spring.datasource.password=password

# HikariCP pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# Flyway
spring.flyway.enabled=true
spring.flyway.schemas=eventdriven
spring.flyway.locations=classpath:db/migration

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=eventdriven

# Kafka (embedded broker sets bootstrap servers dynamically via KafkaConfig bean)
app.kafka.topic=tax-events
